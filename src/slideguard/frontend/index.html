<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SlideGuard Phase 0</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>SlideGuard</h1>
          <p class="muted">文件仅在本机处理，不会上传或访问互联网。</p>
        </div>
        <button id="exit" class="secondary" type="button">退出 SlideGuard</button>
      </header>

      <section class="card" aria-labelledby="connection-title">
        <h2 id="connection-title">本地服务</h2>
        <p id="status">正在连接本地服务…</p>
      </section>

      <section class="card" aria-labelledby="file-title">
        <div class="row between">
          <div>
            <h2 id="file-title">演示文稿</h2>
            <p id="file-summary" class="muted">尚未打开文件</p>
          </div>
          <button id="open-pptx" type="button" disabled>打开 PPT 文件</button>
        </div>
        <p id="file-error" class="error" role="alert" hidden></p>
      </section>

      <section class="card" aria-labelledby="lexicon-title">
        <div class="row between">
          <div>
            <h2 id="lexicon-title">敏感词库</h2>
            <p id="lexicon-summary" class="muted">正在读取词库状态…</p>
          </div>
          <button id="manage-lexicon" type="button" disabled>管理敏感词库</button>
        </div>
        <p id="lexicon-warning" class="warning" hidden>
          敏感词库为空，本项未发现问题不代表无敏感内容。
        </p>
      </section>

      <section class="card" aria-labelledby="scan-title">
        <h2 id="scan-title">开始检查</h2>
        <div class="scan-modes" role="radiogroup" aria-label="检查模式">
          <label><input name="scan-mode" type="radio" value="quick" checked> 快速检查</label>
          <label><input name="scan-mode" type="radio" value="standard"> 标准检查</label>
          <label><input name="scan-mode" type="radio" value="custom"> 自定义检查</label>
        </div>
        <div id="custom-rules" class="rule-grid" hidden>
          <label><input type="checkbox" value="R002" checked> R002 空白页面</label>
          <label><input type="checkbox" value="R003" checked> R003 页面外元素</label>
          <label><input type="checkbox" value="R004" checked> R004 字体一致性</label>
          <label><input type="checkbox" value="R005" checked> R005 字号一致性</label>
          <label><input type="checkbox" value="R006" checked> R006 文本溢出</label>
          <label><input type="checkbox" value="R007" checked> R007 元素对齐</label>
          <label><input type="checkbox" value="R008" checked> R008 文字安全边距</label>
          <label><input type="checkbox" value="R009" checked> R009 标题一致性</label>
          <label><input type="checkbox" value="R010" checked> R010 敏感及残留文本</label>
        </div>
        <div class="row scan-actions">
          <button id="start-scan" type="button" disabled>开始检查</button>
          <button id="cancel-scan" class="secondary" type="button" hidden>取消检查</button>
          <span id="scan-progress" class="muted">请先打开 PPT 文件</span>
        </div>
        <div id="scan-result" hidden></div>
        <button id="view-issues" type="button" hidden>查看问题</button>
      </section>

      <section id="issues-panel" class="card" aria-labelledby="issues-title" hidden>
        <div class="row between"><h2 id="issues-title">问题列表</h2><span id="issues-count" class="muted"></span></div>
        <div class="issue-filters">
          <input id="issue-search" type="search" placeholder="搜索问题描述">
          <select id="severity-filter"><option value="">全部级别</option><option>S1</option><option>S2</option><option>S3</option><option>S4</option></select>
          <select id="rule-filter"><option value="">全部类型</option></select>
          <select id="fixable-filter"><option value="">全部</option><option value="yes">可自动修复</option><option value="no">需手动处理</option></select>
          <select id="status-filter"><option value="">全部状态</option><option value="pending">待处理</option><option value="ignored">已忽略</option></select>
        </div>
        <div class="issue-layout">
          <div id="issue-list" class="issue-list"></div>
          <article id="issue-detail" class="issue-detail" hidden>
            <img id="issue-preview" alt="问题所在幻灯片预览">
            <h3 id="issue-heading"></h3><div id="issue-description"></div>
            <details><summary>技术信息</summary><pre id="issue-technical"></pre></details>
            <div class="row"><button id="previous-issue" class="secondary" type="button">上一个</button><button id="next-issue" class="secondary" type="button">下一个</button><button id="ignore-issue" class="secondary" type="button">忽略</button></div>
          </article>
        </div>
      </section>
    </main>

    <dialog id="lexicon-dialog" aria-labelledby="dialog-title">
      <form method="dialog" id="lexicon-form">
        <div class="row between">
          <h2 id="dialog-title">管理敏感词库</h2>
          <button id="close-lexicon" class="secondary" value="cancel" type="button">关闭</button>
        </div>

        <label>
          搜索词条
          <input id="term-search" type="search" autocomplete="off" placeholder="输入关键字">
        </label>

        <div class="row add-row">
          <label class="grow">
            新增词条
            <input id="new-term" type="text" autocomplete="off" placeholder="输入一个敏感词">
          </label>
          <button id="add-term" type="button">新增</button>
        </div>

        <div id="term-list" class="term-list" aria-live="polite"></div>

        <label>
          批量粘贴（每行一个词条）
          <textarea id="bulk-terms" rows="5" placeholder="旧项目名称&#10;内部代号"></textarea>
        </label>
        <button id="add-bulk" class="secondary" type="button">加入批量词条</button>

        <div class="dialog-actions">
          <span id="edit-summary" class="muted"></span>
          <button id="save-lexicon" type="submit">保存词库</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
